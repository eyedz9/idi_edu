  {page:"Campus Life",section:"Gallery",name:"gallery-18.jpg",alt:"IDI student design project 18",src:"/images/gallery/gallery-18.jpg",type:"local"},
  {page:"Campus Life",section:"Gallery",name:"gallery-19.jpg",alt:"IDI student design project 19",src:"/images/gallery/gallery-19.jpg",type:"local"},
  {page:"Campus Life",section:"Gallery",name:"gallery-20.jpg",alt:"IDI student design project 20",src:"/images/gallery/gallery-20.jpg",type:"local"},
  {page:"Contact",section:"Hero",name:"photo-1497366216548-37526070297c.jpg",alt:"Contact page hero",src:"https://images.unsplash.com/photo-1497366216548-37526070297c?w=400&q=60",type:"unsplash"},
];

const BASE = 'http://localhost:3001';
const pages = [...new Set(DATA.map(d => d.page))];
const pageFilter = document.getElementById('pageFilter');
pages.forEach(p => {
  const o = document.createElement('option');
  o.value = p;
  o.textContent = p;
  pageFilter.appendChild(o);
});

const tbody = document.getElementById('tbody');
const countEl = document.getElementById('count');
const searchEl = document.getElementById('search');
const typeFilterEl = document.getElementById('typeFilter');

function render() {
  const q = searchEl.value.toLowerCase();
  const pf = pageFilter.value;
  const tf = typeFilterEl.value;

  const filtered = DATA.filter(d => {
    if (pf && d.page !== pf) return false;
    if (tf && d.type !== tf) return false;
    if (q && !(d.page + d.section + d.name + d.alt).toLowerCase().includes(q)) return false;
    return true;
  });

  countEl.textContent = String(filtered.length);

  // Clear table
  while (tbody.firstChild) tbody.removeChild(tbody.firstChild);

  filtered.forEach(d => {
    const tr = document.createElement('tr');

    // Thumbnail cell
    const tdThumb = document.createElement('td');
    tdThumb.className = 'thumb-cell';
    const img = document.createElement('img');
    img.className = 'thumb';
    img.src = d.src.startsWith('/') ? BASE + d.src : d.src;
    img.alt = d.alt;
    img.loading = 'lazy';
    img.onerror = function() { this.style.display = 'none'; };
    tdThumb.appendChild(img);
    tr.appendChild(tdThumb);

    // Page cell
    const tdPage = document.createElement('td');
    const badge = document.createElement('span');
    badge.className = 'page-badge';
    badge.textContent = d.page;
    tdPage.appendChild(badge);
    tr.appendChild(tdPage);

    // Section cell
    const tdSection = document.createElement('td');
    tdSection.className = 'section-text';
    tdSection.textContent = d.section;
    tr.appendChild(tdSection);

    // Filename cell
    const tdName = document.createElement('td');
    tdName.className = 'filename';
    tdName.textContent = d.name;
    tr.appendChild(tdName);

    // Alt cell
    const tdAlt = document.createElement('td');
    tdAlt.className = 'alt-text';
    tdAlt.textContent = d.alt;
    tr.appendChild(tdAlt);

    // Type cell
    const tdType = document.createElement('td');
    const typeBadge = document.createElement('span');
    typeBadge.className = d.type === 'local' ? 'type-local' : 'type-unsplash';
    typeBadge.textContent = d.type === 'local' ? 'Local' : 'Unsplash';
    tdType.appendChild(typeBadge);
    tr.appendChild(tdType);

    tbody.appendChild(tr);
  });
}

searchEl.addEventListener('input', render);
pageFilter.addEventListener('change', render);
typeFilterEl.addEventListener('change', render);
render();
</script>
</body>
</html>
